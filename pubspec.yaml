name: smartspend
description: "SmartSpend - AI-powered Budget Monitoring & Location-Intelligent Spending Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  geolocator: ^11.0.0
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0
  fl_chart: ^0.67.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  photo_manager: ^3.6.1
  file_picker: ^8.1.4
  pdfx: ^2.8.0
  path_provider: ^2.1.4
  record: ^6.2.1
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
